<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欣璐宝 · 兰州天气</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--weather-bg, linear-gradient(135deg, #0f0c29, #302b63, #24243e));
    transition: background 1s ease;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.06), transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(255,255,255,0.04), transparent 50%);
    z-index: 0;
    pointer-events: none;
  }

  .weather-effects { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.cloud-bg { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease; }
.cloud-bg.active { opacity: 1; }
.cloud-bg > div { position: absolute; background: rgba(200,210,230,0.18); border-radius: 50%; animation: cloudFloat linear infinite; transition: all 0.5s; box-shadow: 0 0 40px rgba(200,210,230,0.08); }
.cloud-bg-1 { width: 180px; height: 60px; top: 8%; left: -200px; animation-duration: 30s; }
.cloud-bg-2 { width: 240px; height: 70px; top: 16%; left: -300px; animation-duration: 40s; animation-delay: -8s; }
.cloud-bg-3 { width: 150px; height: 50px; top: 25%; left: -150px; animation-duration: 35s; animation-delay: -15s; }
.cloud-bg-4 { width: 200px; height: 55px; top: 32%; left: -250px; background: rgba(180,195,215,0.15); animation-duration: 38s; animation-delay: -5s; }
.cloud-bg-5 { width: 130px; height: 45px; top: 40%; left: -180px; background: rgba(190,205,225,0.12); animation-duration: 32s; animation-delay: -20s; }
@keyframes cloudFloat { 0% { transform: translateX(0); } 100% { transform: translateX(calc(100vw + 400px)); } }
.rain-container { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; }
.rain-container.active { opacity: 1; }
.rain-drop { position: absolute; width: 1.5px; background: linear-gradient(180deg, transparent, rgba(174,194,224,0.5)); animation: rainFall linear infinite; border-radius: 0 0 2px 2px; }
@keyframes rainFall { 0% { transform: translateY(-10px); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0.2; } }
.snow-container { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; }
.snow-container.active { opacity: 1; }
.snow-flake { position: absolute; width: 6px; height: 6px; background: rgba(255,255,255,0.7); border-radius: 50%; animation: snowFall linear infinite; }
@keyframes snowFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0.3; } }
.cloud-bg.heavy .cloud-bg-1, .cloud-bg.heavy .cloud-bg-2, .cloud-bg.heavy .cloud-bg-3 { background: rgba(120,140,170,0.25); }
.cloud-bg.heavy .cloud-bg-4, .cloud-bg.heavy .cloud-bg-5 { background: rgba(100,130,160,0.2); }
.fog-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(200,200,200,0.08), transparent); opacity: 0; transition: opacity 2s ease; }
.fog-overlay.active { opacity: 1; animation: fogSway 8s ease-in-out infinite alternate; }
@keyframes fogSway { 0% { transform: translateX(-5%); } 100% { transform: translateX(5%); } }
.sun-rays { position: absolute; inset: 0; opacity: 0; transition: opacity 2s ease; }
.sun-rays.active { opacity: 1; background: radial-gradient(circle at 70% 20%, rgba(255,200,50,0.08), transparent 50%); animation: sunPulse 4s ease-in-out infinite; }
@keyframes sunPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }
.lightning { position: absolute; inset: 0; opacity: 0; }
.lightning.active { animation: lightningFlash 8s ease-in-out infinite; }
@keyframes lightningFlash { 0%,95%,100% { opacity: 0; } 96% { opacity: 0.9; background: rgba(255,255,255,0.9); } 97% { opacity: 0; } 98% { opacity: 0.6; background: rgba(255,255,255,0.6); } 99% { opacity: 0; } }
.container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
    padding-top: 1.5rem;
  }

  /* ---- Brand Header ---- */
  .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    width: fit-content;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
  }

  .brand-text {
    font-size: 1.35rem;
    font-weight: 700;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.06em;
  }

  .brand-sub {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
    margin-left: auto;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* ---- Main Card ---- */
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 2rem;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }

  .location {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
  }

  .location-name {
    font-size: 1.6rem;
    font-weight: 600;
    color: #fff;
  }

  .location-flag {
    font-size: 1.4rem;
  }

  .update-time {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 1.8rem;
  }

  /* ---- Current Weather ---- */
  .current {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .temp-block {
    display: flex;
    align-items: flex-start;
    gap: 0.2rem;
  }

  .temp-now {
    font-size: 4rem;
    font-weight: 300;
    color: #fff;
    line-height: 1;
  }

  .temp-unit {
    font-size: 1.5rem;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    margin-top: 0.3rem;
  }

  .temp-feels {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    margin-top: 0.2rem;
  }

  .condition-block {
    text-align: right;
  }

  .condition-icon {
    font-size: 3rem;
    margin-bottom: 0.2rem;
  }

  .condition-text {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  /* ---- Detail Grid ---- */
  .details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-bottom: 2rem;
  }

  .detail-item {
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 0.9rem 0.6rem;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
  }

  .detail-item:hover {
    background: rgba(255,255,255,0.08);
  }

  .detail-label {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }

  .detail-value {
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
  }

  /* ---- Forecast ---- */
  .forecast-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0.3rem;
  }
  .forecast-scroll::-webkit-scrollbar {
    height: 4px;
  }
  .forecast-scroll::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
  }
  .forecast-scroll::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
  }


  .forecast-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.8rem;
    letter-spacing: 0.04em;
  }

  .forecast {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    min-width: 490px;
    gap: 0.5rem;
  }

  .forecast-day {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 0.7rem 0.3rem;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .forecast-day-name {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    margin-bottom: 0.3rem;
  }

  .forecast-day-icon {
    font-size: 1.4rem;
    margin-bottom: 0.2rem;
  }

  .forecast-day-temp {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  .forecast-day-range {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    margin-top: 0.1rem;
  }

  /* ---- Load / Error ---- */
  .loading {
    text-align: center;
    padding: 3rem 0;
    color: rgba(255,255,255,0.5);
  }

  .loading .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #f5576c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.8rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 2rem;
    color: rgba(255,255,255,0.6);
  }

  .error-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .retry-btn {
    margin-top: 1rem;
    padding: 0.5rem 1.2rem;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .retry-btn:hover {
    background: rgba(255,255,255,0.18);
  }

  .hidden { display: none; }

  @media (max-width: 420px) {
    .card { padding: 1.3rem; }
    .temp-now { font-size: 3.2rem; }
    .details { gap: 0.5rem; }
    .detail-item { padding: 0.7rem 0.3rem; }
    .forecast { gap: 0.3rem; }
    .forecast-day { padding: 0.5rem 0.2rem; }
  }
</style>
</head>
<body>

<div class="weather-effects"><div class="rain-container" id="rainContainer"></div><div class="snow-container" id="snowContainer"></div><div class="fog-overlay" id="fogOverlay"></div><div class="cloud-bg" id="cloudBg">  <div class="cloud-bg-1"></div>  <div class="cloud-bg-2"></div>  <div class="cloud-bg-3"></div></div><div class="sun-rays" id="sunRays"></div><div class="lightning" id="lightning"></div></div><div class="container">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">欣</div>
    <span class="brand-text">欣璐宝</span>
    <span class="brand-sub">Weather</span>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- Location -->
    <div class="location">
      <span class="location-name">兰州</span>
      <span class="location-flag">🇨🇳</span>
      <span style="font-size:0.75rem;color:rgba(255,255,255,0.25);margin-left:auto;">Lanzhou</span>
    </div>
    <div class="update-time" id="updateTime">正在获取…</div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>获取天气数据中…</div>
    </div>

    <!-- Error -->
    <div class="error hidden" id="error">
      <div class="error-icon">🌧️</div>
      <div id="errorMsg">获取天气失败</div>
      <button class="retry-btn" onclick="fetchWeather()">重试</button>
    </div>

    <!-- Weather Content -->
    <div id="weatherContent" class="hidden">
      <!-- Current -->
      <div class="current">
        <div>
          <div class="temp-block">
            <span class="temp-now" id="tempNow">--</span>
            <span class="temp-unit">°C</span>
          </div>
          <div class="temp-feels" id="feelsLike">体感温度 --°C</div>
        </div>
        <div class="condition-block">
          <div class="condition-icon" id="conditionIcon">☀️</div>
          <div class="condition-text" id="conditionText">--</div>
        </div>
      </div>

      <!-- Details -->
      <div class="details">
        <div class="detail-item">
          <div class="detail-label">湿度</div>
          <div class="detail-value" id="humidity">--%</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">风速</div>
          <div class="detail-value" id="windSpeed">-- km/h</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">气压</div>
          <div class="detail-value" id="pressure">-- hPa</div>
        </div>
      </div>

      <!-- Forecast -->
      <div class="forecast-title">未来 7 日预报</div>
      <div class="forecast-scroll"><div class="forecast" id="forecastGrid"></div></div>
    </div>
  </div>

  <div style="text-align:center;margin-top:1rem;font-size:0.65rem;color:rgba(255,255,255,0.15);">
    数据来源：Open-Meteo · 欣璐宝
  </div>
</div>

<script>
const DAY_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];

const WMO_CODES = {
  0:  { desc: '晴',      emoji: '☀️' },
  1:  { desc: '晴间多云', emoji: '🌤️' },
  2:  { desc: '多云',    emoji: '⛅'  },
  3:  { desc: '阴',      emoji: '☁️'  },
  45: { desc: '雾',      emoji: '🌫️' },
  48: { desc: '大雾',    emoji: '🌫️' },
  51: { desc: '毛毛雨',  emoji: '🌦️' },
  53: { desc: '毛毛雨',  emoji: '🌦️' },
  55: { desc: '大毛毛雨', emoji: '🌧️' },
  56: { desc: '冻毛毛雨', emoji: '🌧️' },
  57: { desc: '冻毛毛雨', emoji: '🌧️' },
  61: { desc: '小雨',    emoji: '🌦️' },
  63: { desc: '中雨',    emoji: '🌧️' },
  65: { desc: '大雨',    emoji: '🌧️' },
  66: { desc: '冻雨',    emoji: '🧊'  },
  67: { desc: '冻雨',    emoji: '🧊'  },
  71: { desc: '小雪',    emoji: '🌨️' },
  73: { desc: '中雪',    emoji: '❄️'  },
  75: { desc: '大雪',    emoji: '❄️'  },
  77: { desc: '雪粒',    emoji: '❄️'  },
  80: { desc: '阵雨',    emoji: '🌦️' },
  81: { desc: '中阵雨',  emoji: '🌧️' },
  82: { desc: '大阵雨',  emoji: '🌧️' },
  85: { desc: '小阵雪',  emoji: '🌨️' },
  86: { desc: '大阵雪',  emoji: '❄️'  },
  95: { desc: '雷阵雨',  emoji: '⛈️' },
  96: { desc: '雷阵雨+冰雹', emoji: '⛈️' },
  99: { desc: '雷阵雨+冰雹', emoji: '⛈️' },
};

function spawnRain(){const c=document.getElementById("rainContainer");c.innerHTML="";for(let i=0;i<80;i++){const d=document.createElement("div");d.className="rain-drop";d.style.left=Math.random()*100+"%";d.style.height=(10+Math.random()*20)+"px";d.style.animationDuration=(0.4+Math.random()*0.4)+"s";d.style.animationDelay=Math.random()*1.5+"s";c.appendChild(d);}}
function spawnSnow(){const c=document.getElementById("snowContainer");c.innerHTML="";for(let i=0;i<60;i++){const d=document.createElement("div");d.className="snow-flake";d.style.left=Math.random()*100+"%";d.style.width=d.style.height=(3+Math.random()*5)+"px";d.style.animationDuration=(3+Math.random()*4)+"s";d.style.animationDelay=Math.random()*5+"s";d.style.opacity=0.3+Math.random()*0.5;c.appendChild(d);}}
function setWeatherFx(code,isDay){const ids={r:"rainContainer",s:"snowContainer",f:"fogOverlay",c:"cloudBg",u:"sunRays",l:"lightning"};
for(const k of Object.values(ids)){document.getElementById(k).classList.remove("active");}
if(code===0&&isDay){document.getElementById(ids.u).classList.add("active");}
if(code>=1&&code<=3){document.getElementById(ids.c).classList.add("active");if(code===3)document.getElementById(ids.c).classList.add("heavy");}
if(code===2){document.getElementById(ids.u).classList.add("active");document.getElementById(ids.c).classList.add("active");}
if(code===45||code===48){document.getElementById(ids.f).classList.add("active");document.getElementById(ids.c).classList.add("active");}
if((code>=51&&code<=57)||(code>=61&&code<=67)||(code>=80&&code<=82)){spawnRain();document.getElementById(ids.r).classList.add("active");document.getElementById(ids.c).classList.add("active");document.getElementById(ids.c).classList.add("heavy");}
if((code>=71&&code<=77)||(code>=85&&code<=86)){spawnSnow();document.getElementById(ids.s).classList.add("active");document.getElementById(ids.c).classList.add("active");}
if(code>=95&&code<=99){spawnRain();document.getElementById(ids.r).classList.add("active");document.getElementById(ids.c).classList.add("active");document.getElementById(ids.c).classList.add("heavy");document.getElementById(ids.l).classList.add("active");}}
function getWMO(code) {
  return WMO_CODES[code] || { desc: '未知', emoji: '🌡️' };
}

const WEATHER_BGS = {
  // [weather_code]: { day: 'gradient', night: 'gradient' }
  // 0=晴, 1-3=多云, 45-48=雾, 51-57=毛毛雨, 61-67=雨, 71-77=雪, 80-82=阵雨, 85-86=阵雪, 95-99=雷暴
  0:   { day: 'linear-gradient(135deg, #f5af19, #f12711)', night: 'linear-gradient(135deg, #0f0c29, #302b63)' },
  1:   { day: 'linear-gradient(135deg, #87CEEB, #6CA6DE)', night: 'linear-gradient(135deg, #1a1a2e, #16213e)' },
  2:   { day: 'linear-gradient(135deg, #7da0d4, #a0bcdc, #b8cce0)', night: 'linear-gradient(135deg, #1a2332, #2a3a4a)' },
  3:   { day: 'linear-gradient(135deg, #5b7a91, #7d9bb0, #9ab4c5)', night: 'linear-gradient(135deg, #1a2332, #2a3a4a, #1e2c38)' },
  45:  { day: 'linear-gradient(135deg, #B6B6B6, #8e9eab)', night: 'linear-gradient(135deg, #1a1a2e, #2c3e50)' },
  48:  { day: 'linear-gradient(135deg, #a0a0a0, #707070)', night: 'linear-gradient(135deg, #1a1a2e, #2c3e50)' },
  51:  { day: 'linear-gradient(135deg, #6b92c7, #3a5f8a)', night: 'linear-gradient(135deg, #0a0a1a, #1a1a3e)' },
  53:  { day: 'linear-gradient(135deg, #5a82b7, #2a4f7a)', night: 'linear-gradient(135deg, #0a0a1a, #1a1a3e)' },
  55:  { day: 'linear-gradient(135deg, #4a72a7, #1a3f6a)', night: 'linear-gradient(135deg, #0a0a1a, #1a1a3e)' },
  61:  { day: 'linear-gradient(135deg, #4b6cb7, #182848)', night: 'linear-gradient(135deg, #050510, #0a0a2e)' },
  63:  { day: 'linear-gradient(135deg, #3a5ca7, #081838)', night: 'linear-gradient(135deg, #050510, #0a0a2e)' },
  65:  { day: 'linear-gradient(135deg, #2a4c97, #000828)', night: 'linear-gradient(135deg, #020208, #050520)' },
  80:  { day: 'linear-gradient(135deg, #5a7db7, #2a4d7a)', night: 'linear-gradient(135deg, #0a0a1a, #1a1a3e)' },
  81:  { day: 'linear-gradient(135deg, #4a6da7, #1a3d6a)', night: 'linear-gradient(135deg, #0a0a1a, #1a1a3e)' },
  82:  { day: 'linear-gradient(135deg, #3a5d97, #0a2d5a)', night: 'linear-gradient(135deg, #0a0a1a, #1a1a3e)' },
  71:  { day: 'linear-gradient(135deg, #E6DADA, #C8D8E8)', night: 'linear-gradient(135deg, #1e2838, #2a3a4a)' },
  73:  { day: 'linear-gradient(135deg, #D6D6D6, #B8C8D8)', night: 'linear-gradient(135deg, #1e2838, #2a3a4a)' },
  75:  { day: 'linear-gradient(135deg, #C6C6C6, #A8B8C8)', night: 'linear-gradient(135deg, #1e2838, #2a3a4a)' },
  85:  { day: 'linear-gradient(135deg, #D6D6D6, #B8C8D8)', night: 'linear-gradient(135deg, #1e2838, #2a3a4a)' },
  86:  { day: 'linear-gradient(135deg, #C6C6C6, #A8B8C8)', night: 'linear-gradient(135deg, #1e2838, #2a3a4a)' },
  95:  { day: 'linear-gradient(135deg, #2d1b4e, #1a1a2e)', night: 'linear-gradient(135deg, #0a0515, #1a0a2e)' },
  96:  { day: 'linear-gradient(135deg, #2d1b4e, #1a1a2e)', night: 'linear-gradient(135deg, #0a0515, #1a0a2e)' },
  99:  { day: 'linear-gradient(135deg, #2d1b4e, #1a1a2e)', night: 'linear-gradient(135deg, #0a0515, #1a0a2e)' },
};

function setWeatherBg(code, isDay) {
  const cfg = WEATHER_BGS[code] || WEATHER_BGS[0];
  const bg = isDay ? cfg.day : cfg.night;
  document.body.style.setProperty('--weather-bg', bg);
}

async function fetchWeather() {
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');
  const content = document.getElementById('weatherContent');

  loading.classList.remove('hidden');
  error.classList.add('hidden');
  content.classList.add('hidden');

  try {
    // Open-Meteo API (free, no API key, great CORS support)
    const res = await fetch(
      'https://api.open-meteo.com/v1/forecast?' +
      'latitude=36.06&longitude=103.79' +
      '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure,is_day' +
      '&daily=temperature_2m_max,temperature_2m_min,weather_code' +
      '&timezone=Asia%2FShanghai&forecast_days=7'
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const cur = data.current;
    const daily = data.daily;

    // Update time
    const now = new Date();
    document.getElementById('updateTime').textContent =
      `更新于 ${now.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' })}`;

    // Current weather
    const wmoCur = getWMO(cur.weather_code);
    setWeatherBg(cur.weather_code, cur.is_day); setWeatherFx(cur.weather_code, cur.is_day);
    document.getElementById('tempNow').textContent = Math.round(cur.temperature_2m);
    document.getElementById('feelsLike').textContent =
      `体感温度 ${Math.round(cur.apparent_temperature)}°C`;
    document.getElementById('conditionIcon').textContent = wmoCur.emoji;
    document.getElementById('conditionText').textContent = wmoCur.desc;
    document.getElementById('humidity').textContent = `${cur.relative_humidity_2m}%`;
    document.getElementById('windSpeed').textContent =
      `${cur.wind_speed_10m} km/h`;
    document.getElementById('pressure').textContent =
      `${Math.round(cur.surface_pressure)} hPa`;

    // 7-day forecast
    const grid = document.getElementById('forecastGrid');
    grid.innerHTML = '';
    daily.time.forEach((dateStr, i) => {
      const date = new Date(dateStr + 'T00:00:00');
      const dayName = i === 0 ? '今天' : DAY_NAMES[date.getDay()];
      const wmo = getWMO(daily.weather_code[i]);
      const avgTemp = Math.round((daily.temperature_2m_max[i] + daily.temperature_2m_min[i]) / 2);

      const el = document.createElement('div');
      el.className = 'forecast-day';
      el.innerHTML = `
        <div class="forecast-day-name">${dayName}</div>
        <div class="forecast-day-icon">${wmo.emoji}</div>
        <div class="forecast-day-temp">${avgTemp}°</div>
        <div class="forecast-day-range">${Math.round(daily.temperature_2m_min[i])}° / ${Math.round(daily.temperature_2m_max[i])}°</div>
      `;
      grid.appendChild(el);
    });

    loading.classList.add('hidden');
    content.classList.remove('hidden');
  } catch (err) {
    loading.classList.add('hidden');
    error.classList.remove('hidden');
    document.getElementById('errorMsg').textContent =
      err.message || '网络错误，请稍后重试';
  }
}

fetchWeather();
</script>

</html>
