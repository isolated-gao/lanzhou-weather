<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欣璐宝 · 兰州天气</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.15), transparent 70%);
    top: -200px;
    right: -200px;
    z-index: 0;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(236, 72, 153, 0.1), transparent 70%);
    bottom: -200px;
    left: -200px;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
    padding-top: 1.5rem;
  }

  /* ---- Brand Header ---- */
  .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    width: fit-content;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
  }

  .brand-text {
    font-size: 1.35rem;
    font-weight: 700;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.06em;
  }

  .brand-sub {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
    margin-left: auto;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* ---- Main Card ---- */
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 2rem;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }

  .location {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
  }

  .location-name {
    font-size: 1.6rem;
    font-weight: 600;
    color: #fff;
  }

  .location-flag {
    font-size: 1.4rem;
  }

  .update-time {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 1.8rem;
  }

  /* ---- Current Weather ---- */
  .current {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .temp-block {
    display: flex;
    align-items: flex-start;
    gap: 0.2rem;
  }

  .temp-now {
    font-size: 4rem;
    font-weight: 300;
    color: #fff;
    line-height: 1;
  }

  .temp-unit {
    font-size: 1.5rem;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    margin-top: 0.3rem;
  }

  .temp-feels {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    margin-top: 0.2rem;
  }

  .condition-block {
    text-align: right;
  }

  .condition-icon {
    font-size: 3rem;
    margin-bottom: 0.2rem;
  }

  .condition-text {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  /* ---- Detail Grid ---- */
  .details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-bottom: 2rem;
  }

  .detail-item {
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 0.9rem 0.6rem;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
  }

  .detail-item:hover {
    background: rgba(255,255,255,0.08);
  }

  .detail-label {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }

  .detail-value {
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
  }

  /* ---- Forecast ---- */
  .forecast-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0.3rem;
  }
  .forecast-scroll::-webkit-scrollbar {
    height: 4px;
  }
  .forecast-scroll::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
  }
  .forecast-scroll::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
  }


  .forecast-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.8rem;
    letter-spacing: 0.04em;
  }

  .forecast {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    min-width: 490px;
    gap: 0.5rem;
  }

  .forecast-day {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 0.7rem 0.3rem;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .forecast-day-name {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    margin-bottom: 0.3rem;
  }

  .forecast-day-icon {
    font-size: 1.4rem;
    margin-bottom: 0.2rem;
  }

  .forecast-day-temp {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  .forecast-day-range {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    margin-top: 0.1rem;
  }

  /* ---- Load / Error ---- */
  .loading {
    text-align: center;
    padding: 3rem 0;
    color: rgba(255,255,255,0.5);
  }

  .loading .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #f5576c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.8rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 2rem;
    color: rgba(255,255,255,0.6);
  }

  .error-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .retry-btn {
    margin-top: 1rem;
    padding: 0.5rem 1.2rem;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .retry-btn:hover {
    background: rgba(255,255,255,0.18);
  }

  .hidden { display: none; }

  @media (max-width: 420px) {
    .card { padding: 1.3rem; }
    .temp-now { font-size: 3.2rem; }
    .details { gap: 0.5rem; }
    .detail-item { padding: 0.7rem 0.3rem; }
    .forecast { gap: 0.3rem; }
    .forecast-day { padding: 0.5rem 0.2rem; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">欣</div>
    <span class="brand-text">欣璐宝</span>
    <span class="brand-sub">Weather</span>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- Location -->
    <div class="location">
      <span class="location-name">兰州</span>
      <span class="location-flag">🇨🇳</span>
      <span style="font-size:0.75rem;color:rgba(255,255,255,0.25);margin-left:auto;">Lanzhou</span>
    </div>
    <div class="update-time" id="updateTime">正在获取…</div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>获取天气数据中…</div>
    </div>

    <!-- Error -->
    <div class="error hidden" id="error">
      <div class="error-icon">🌧️</div>
      <div id="errorMsg">获取天气失败</div>
      <button class="retry-btn" onclick="fetchWeather()">重试</button>
    </div>

    <!-- Weather Content -->
    <div id="weatherContent" class="hidden">
      <!-- Current -->
      <div class="current">
        <div>
          <div class="temp-block">
            <span class="temp-now" id="tempNow">--</span>
            <span class="temp-unit">°C</span>
          </div>
          <div class="temp-feels" id="feelsLike">体感温度 --°C</div>
        </div>
        <div class="condition-block">
          <div class="condition-icon" id="conditionIcon">☀️</div>
          <div class="condition-text" id="conditionText">--</div>
        </div>
      </div>

      <!-- Details -->
      <div class="details">
        <div class="detail-item">
          <div class="detail-label">湿度</div>
          <div class="detail-value" id="humidity">--%</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">风速</div>
          <div class="detail-value" id="windSpeed">-- km/h</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">气压</div>
          <div class="detail-value" id="pressure">-- hPa</div>
        </div>
      </div>

      <!-- Forecast -->
      <div class="forecast-title">未来 7 日预报</div>
      <div class="forecast-scroll"><div class="forecast" id="forecastGrid"></div></div>
    </div>
  </div>

  <div style="text-align:center;margin-top:1rem;font-size:0.65rem;color:rgba(255,255,255,0.15);">
    数据来源：Open-Meteo · 欣璐宝
  </div>
</div>

<script>
const DAY_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];

const WMO_CODES = {
  0:  { desc: '晴',      emoji: '☀️' },
  1:  { desc: '晴间多云', emoji: '🌤️' },
  2:  { desc: '多云',    emoji: '⛅'  },
  3:  { desc: '阴',      emoji: '☁️'  },
  45: { desc: '雾',      emoji: '🌫️' },
  48: { desc: '大雾',    emoji: '🌫️' },
  51: { desc: '毛毛雨',  emoji: '🌦️' },
  53: { desc: '毛毛雨',  emoji: '🌦️' },
  55: { desc: '大毛毛雨', emoji: '🌧️' },
  56: { desc: '冻毛毛雨', emoji: '🌧️' },
  57: { desc: '冻毛毛雨', emoji: '🌧️' },
  61: { desc: '小雨',    emoji: '🌦️' },
  63: { desc: '中雨',    emoji: '🌧️' },
  65: { desc: '大雨',    emoji: '🌧️' },
  66: { desc: '冻雨',    emoji: '🧊'  },
  67: { desc: '冻雨',    emoji: '🧊'  },
  71: { desc: '小雪',    emoji: '🌨️' },
  73: { desc: '中雪',    emoji: '❄️'  },
  75: { desc: '大雪',    emoji: '❄️'  },
  77: { desc: '雪粒',    emoji: '❄️'  },
  80: { desc: '阵雨',    emoji: '🌦️' },
  81: { desc: '中阵雨',  emoji: '🌧️' },
  82: { desc: '大阵雨',  emoji: '🌧️' },
  85: { desc: '小阵雪',  emoji: '🌨️' },
  86: { desc: '大阵雪',  emoji: '❄️'  },
  95: { desc: '雷阵雨',  emoji: '⛈️' },
  96: { desc: '雷阵雨+冰雹', emoji: '⛈️' },
  99: { desc: '雷阵雨+冰雹', emoji: '⛈️' },
};

function getWMO(code) {
  return WMO_CODES[code] || { desc: '未知', emoji: '🌡️' };
}

async function fetchWeather() {
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');
  const content = document.getElementById('weatherContent');

  loading.classList.remove('hidden');
  error.classList.add('hidden');
  content.classList.add('hidden');

  try {
    // Open-Meteo API (free, no API key, great CORS support)
    const res = await fetch(
      'https://api.open-meteo.com/v1/forecast?' +
      'latitude=36.06&longitude=103.79' +
      '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure' +
      '&daily=temperature_2m_max,temperature_2m_min,weather_code' +
      '&timezone=Asia%2FShanghai&forecast_days=7'
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const cur = data.current;
    const daily = data.daily;

    // Update time
    const now = new Date();
    document.getElementById('updateTime').textContent =
      `更新于 ${now.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' })}`;

    // Current weather
    const wmoCur = getWMO(cur.weather_code);
    document.getElementById('tempNow').textContent = Math.round(cur.temperature_2m);
    document.getElementById('feelsLike').textContent =
      `体感温度 ${Math.round(cur.apparent_temperature)}°C`;
    document.getElementById('conditionIcon').textContent = wmoCur.emoji;
    document.getElementById('conditionText').textContent = wmoCur.desc;
    document.getElementById('humidity').textContent = `${cur.relative_humidity_2m}%`;
    document.getElementById('windSpeed').textContent =
      `${cur.wind_speed_10m} km/h`;
    document.getElementById('pressure').textContent =
      `${Math.round(cur.surface_pressure)} hPa`;

    // 7-day forecast
    const grid = document.getElementById('forecastGrid');
    grid.innerHTML = '';
    daily.time.forEach((dateStr, i) => {
      const date = new Date(dateStr + 'T00:00:00');
      const dayName = i === 0 ? '今天' : DAY_NAMES[date.getDay()];
      const wmo = getWMO(daily.weather_code[i]);
      const avgTemp = Math.round((daily.temperature_2m_max[i] + daily.temperature_2m_min[i]) / 2);

      const el = document.createElement('div');
      el.className = 'forecast-day';
      el.innerHTML = `
        <div class="forecast-day-name">${dayName}</div>
        <div class="forecast-day-icon">${wmo.emoji}</div>
        <div class="forecast-day-temp">${avgTemp}°</div>
        <div class="forecast-day-range">${Math.round(daily.temperature_2m_min[i])}° / ${Math.round(daily.temperature_2m_max[i])}°</div>
      `;
      grid.appendChild(el);
    });

    loading.classList.add('hidden');
    content.classList.remove('hidden');
  } catch (err) {
    loading.classList.add('hidden');
    error.classList.remove('hidden');
    document.getElementById('errorMsg').textContent =
      err.message || '网络错误，请稍后重试';
  }
}

fetchWeather();
</script>
</body>
</html>
